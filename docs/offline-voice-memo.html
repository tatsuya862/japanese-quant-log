<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline Voice Memo | QUANT LOG by Tatsuya</title>
  <meta name="description" content="電波圏外でもひらめきを録音し、ローカルに音声とMarkdownログを保存するQuant Logのオフライン音声メモMVP。">
  <link rel="icon" type="image/png" href="assets/favicon_16x16.png">

  <main class="offline-voice-page" aria-label="Offline Voice Memo">

      <svg viewBox="0 0 24 24" aria-hidden="true">

        <path d="M5 11a7 7 0 0 0 14 0"></path>

      </svg>
    </button>
    <p class="voice-status" data-voice-status>タップで録音開始</p>
    <p class="voice-transcript" data-voice-transcript hidden></p>
  </main>
  <script src="offline-voice-memo.js?v=offline-voice-memo-03"></script>
